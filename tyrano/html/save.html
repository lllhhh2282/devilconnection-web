<div style="width: 100%; height: 100%">
  <div
    class="menu_item"
    style="position: absolute; bottom: -9px; right: 0px; z-index: 99"
  >
    <img class="menu_close" src="data/image/menu/modoru.png" />
  </div>

  <div style="clear: both"></div>

  <img
    class="button_arrow_up button_smart"
    src="tyrano/images/system/arrow_up.png"
    style="cursor: pointer; left: 670px; top: 20px; position: absolute"
  />
  <img
    class="button_arrow_down button_smart"
    src="tyrano/images/system/arrow_down.png"
    style="cursor: pointer; left: 760px; top: 15px; position: absolute"
  />

  <div
    class="area_save_list"
    style="overflow: auto; height: 100%; position: relative"
  ></div>

  <img
    class="img_label img_label_save"
    src="data/image/ui/save_label.png"
    style="left: 312px; top: 8px; position: absolute"
  />
  <img
    class="img_bg_base"
    src="data/image/menu/menu_.png"
    style="
      z-index: -1;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      position: absolute;
    "
  />

  <style>
    /*両方共通（はみ出したらスクロールさせる）*/
    .area_save_list::-webkit-scrollbar {
      width: 15px;
    }

    .area_save_list::-webkit-scrollbar-thumb {
      background: #6495ed;
      border-radius: 10px;
    }

    .area_save_list::-webkit-scrollbar-track-piece:start {
      background: gray;
    }

    .area_save_list::-webkit-scrollbar-track-piece:end {
      background: #fff;
    }
  </style>
</div>
