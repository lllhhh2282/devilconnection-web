<div>
  <div class="display_menu block_menu">
    <div id="menu_items">
      <img
        class="complete"
        src="data/image/menu/complete.png"
        style="top: 70px; left: 102px"
      />
      {{if epilogue}}
      <img
        class="phase"
        src="data/image/ui/save{{:day}}_epilogue.png"
        style="position: absolute; top: 136px; left: 385px"
      />
      {{else}}
      <img
        class="phase"
        src="data/image/menu/day{{:day}}_menu.png"
        style="position: absolute; top: 136px; left: 376px"
      />
      {{if finished.length >= day * 3 + 1}}
      <img
        class="phase_meter"
        src="data/image/ui/save.png"
        style="position: absolute; top: 228px; left: 403px"
      />
      {{/if}} {{if finished.length >= day * 3 + 2}}
      <img
        class="phase_meter"
        src="data/image/ui/save.png"
        style="position: absolute; top: 228px; left: 468px"
      />
      {{/if}} {{if finished.length >= day * 3 + 3}}
      <img
        class="phase_meter"
        src="data/image/ui/save.png"
        style="position: absolute; top: 228px; left: 533px"
      />
      {{/if}} {{/if}}
      <p
        id="ending_count"
        style="
          top: 219px;
          left: 115px;
          width: 118px;
          text-align: center;
          font-size: 32px;
          color: #322e4e;
        "
      >
        ?/?
      </p>
      <p
        id="character_count"
        style="
          top: 219px;
          left: 240px;
          width: 118px;
          text-align: center;
          font-size: 32px;
          color: #322e4e;
        "
      >
        ?/?
      </p>

      <img
        class="menu_save"
        src="data/image/menu/button_save{{:kSuffix}}.png"
        style="top: 446px; left: 665px"
      />
      <p
        id="auto_save_date"
        style="
          top: 402px;
          left: 672px;
          font-size: 24px;
          color: rgb(50, 46, 78);
          width: 250px;
          text-align: center;
        "
      ></p>

      <img
        class="menu_load"
        src="data/image/menu/button_load{{:kSuffix}}.png"
        style="top: 83px; left: 669px"
      />

      <img
        class="menu_option"
        src="data/image/menu/button_option{{:kSuffix}}.png"
        style="top: 549px; left: 104px"
      />

      <img
        class="menu_back_title"
        src="data/image/menu/button_title{{:kSuffix}}.png"
        style="top: 291px; left: 101px"
      />

      <img
        class="menu_close"
        src="data/image/menu/modoru.png"
        style="top: 874px; left: 1196px"
      />

      <img
        src="data/image/toumei.png"
        style="width: 100%; height: 100%; top: 0; left: 0; z-index: 1"
        usemap="#map"
      />

      <img
        class="sex"
        src="data/image/menu/sex_{{:sex}}_menu.png"
        style="top: 700px; left: 866px"
      />

      <map name="map">
        <area
          class="menu_item area_save"
          href="javascript:void(0);"
          coords="668,496,871,469,945,448,1160,498,1169,827,933,813,766,763,673,703"
          shape="poly"
        />
        <area
          class="menu_item area_load"
          href="javascript:void(0);"
          coords="666,121,677,375,719,461,860,462,1166,395,1174,162,961,80"
          shape="poly"
        />
        <area
          class="menu_item area_option"
          href="javascript:void(0);"
          coords="150,573,474,556,523,570,580,777,479,798,146,798,108,668,103,600"
          shape="poly"
        />
        <area
          class="menu_item area_back_title"
          href="javascript:void(0);"
          coords="390,300,118,319,102,395,140,560,613,552,629,365"
          shape="poly"
        />
        <area
          class="menu_item area_close"
          href="javascript:void(0);"
          coords="1238,916,42"
          shape="circle"
        />
      </map>
    </div>

    <img
      class="img_label img_label_story"
      src="data/image/menu/menu_tag.png"
      style="left: 311px; top: 9px; position: absolute"
    />
  </div>

  <canvas
    class="img_bg_base"
    style="z-index: -1; left: 0; top: 0; position: absolute"
  />
</div>
